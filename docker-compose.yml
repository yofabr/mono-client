
services:
  app:
    build: .
    container_name: mono-client
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT}
      PG_DSN: ${PG_DSN}
      REDIS_ADD: ${REDIS_ADD}
      REDIS_PASS: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5


  redis:
    image: redis:latest
    restart: always
    env_file:
      - .env
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5


volumes:
  pgdata:
  redis_data:
